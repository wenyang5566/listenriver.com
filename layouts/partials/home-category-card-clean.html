{{- $item := .item -}}
{{- $page := $item.page -}}
{{- if $page -}}
{{- $description := $item.description | default $page.Description | default $page.Summary | plainify -}}
<article class="category-card">
  <a class="category-card__link" href="{{ $page.RelPermalink }}">
    <span class="category-card__eyebrow">Category</span>
    <h3 class="category-card__title">{{ $item.title | default $page.Title }}</h3>
    <p class="category-card__description">{{ $description }}</p>
    <div class="category-card__meta">
      <span>{{ $item.count }} posts</span>
      <span>Open</span>
    </div>
  </a>
</article>
{{- end -}}
