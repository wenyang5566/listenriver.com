{{- $brandTitle := .Site.Title | default "Listen River" -}}

<header id="site-header" class="site-header">
  <div class="header-top-shell">
    <div class="header-top">
      <a href="{{ "/" | relLangURL }}" class="header-brand-text" aria-label="回到首頁">
        <span class="header-brand-text__title">聆聽的河流</span>
        <span class="header-brand-text__subtitle">閱讀・書寫・心理・社會工作</span>
      </a>

      <div class="header-side header-side-right">
        <button class="header-icon-button header-mobile-menu-toggle" type="button" aria-label="開啟選單" aria-controls="mobile-nav-drawer" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 17h16"></path>
          </svg>
        </button>
        {{- if not site.Params.disableThemeToggle }}
        <button id="theme-toggle" class="header-icon-button" accesskey="t" title="切換夜間模式 (Alt + T)" aria-label="切換夜間模式">
          <svg id="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg id="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        {{- end }}
        <a href="{{ "/search/" | relLangURL }}" class="header-icon-link" aria-label="搜尋">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
        </a>
      </div>
    </div>
  </div>

  <nav class="header-nav-shell" aria-label="主選單">
    <div class="header-nav header-nav-groups">
      <a href="{{ "/" | relLangURL }}" class="nav-chip nav-chip-home">Home</a>
      <a href="{{ "/categories/" | relLangURL }}" class="nav-chip nav-chip-more">Categories</a>
      <a href="{{ "/about/" | relLangURL }}" class="nav-chip nav-chip-more">About</a>
      <a href="{{ "/search/" | relLangURL }}" class="nav-chip nav-chip-more">Search</a>
    </div>
  </nav>

  <div class="mobile-nav-backdrop" data-mobile-nav-close hidden></div>
  <aside id="mobile-nav-drawer" class="mobile-nav-drawer" aria-label="手機選單" aria-hidden="true" inert>
    <div class="mobile-nav-drawer-head">
      <div>
        <div class="mobile-nav-eyebrow">導覽</div>
        <div class="mobile-nav-title">{{ $brandTitle }}</div>
      </div>
      <button class="header-icon-button mobile-nav-close" type="button" aria-label="關閉選單" data-mobile-nav-close>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12"></path>
          <path d="M18 6l-12 12"></path>
        </svg>
      </button>
    </div>

    <div class="mobile-nav-primary mobile-nav-primary--simple">
      <a href="{{ "/" | relLangURL }}" class="mobile-nav-primary-link">Home</a>
      <a href="{{ "/categories/" | relLangURL }}" class="mobile-nav-primary-link">Categories</a>
      <a href="{{ "/about/" | relLangURL }}" class="mobile-nav-primary-link">About</a>
      <a href="{{ "/search/" | relLangURL }}" class="mobile-nav-primary-link">Search</a>
    </div>
  </aside>

  <div class="mobile-reading-progress" aria-hidden="true">
    <span class="mobile-reading-progress-bar" data-reading-progress></span>
  </div>

  <nav class="mobile-bottom-bar{{ if .IsPage }} mobile-bottom-bar--article{{ end }}" aria-label="手機快捷操作">
    {{- if .IsPage }}
      <a href="{{ "/" | relLangURL }}" class="mobile-bottom-link mobile-bottom-link--article" aria-label="回首頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5.5 9.5V21h13V9.5"></path></svg>
        <span class="mobile-bottom-link__label">首頁</span>
      </a>
      <button class="mobile-bottom-link mobile-bottom-link-button mobile-bottom-link--article" type="button" data-mobile-back data-fallback-url="{{ "/categories/" | relLangURL }}" aria-label="回上一頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
        <span class="mobile-bottom-link__label">上一頁</span>
      </button>
      <button class="mobile-bottom-link mobile-bottom-link-button mobile-bottom-link--article" type="button" data-mobile-toc-shortcut aria-label="開啟目錄">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 7h14"></path><path d="M5 12h10"></path><path d="M5 17h14"></path></svg>
        <span class="mobile-bottom-link__label">目錄</span>
      </button>
      <button class="mobile-bottom-link mobile-bottom-link-button mobile-bottom-link--article" type="button" data-scroll-top aria-label="回到頂部">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"></path></svg>
        <span class="mobile-bottom-link__label">頂部</span>
      </button>
    {{- else }}
    <a href="{{ "/" | relLangURL }}" class="mobile-bottom-link{{ if .IsHome }} is-active{{ end }}" aria-label="回首頁">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5.5 9.5V21h13V9.5"></path></svg>
      <span>首頁</span>
    </a>
    <a href="{{ "/categories/" | relLangURL }}" class="mobile-bottom-link{{ if eq .Data.Plural "categories" }} is-active{{ end }}" aria-label="分類總覽">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h7v5H4z"></path><path d="M13 6h7v5h-7z"></path><path d="M4 13h7v5H4z"></path><path d="M13 13h7v5h-7z"></path></svg>
      <span>分類</span>
    </a>
    <a href="{{ "/search/" | relLangURL }}" class="mobile-bottom-link{{ if eq .Layout "search" }} is-active{{ end }}" aria-label="搜尋">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
      <span>搜尋</span>
    </a>
    <button class="mobile-bottom-link mobile-bottom-link-button" type="button" data-scroll-top aria-label="回到頂部">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"></path></svg>
      <span>頂部</span>
    </button>
    {{- end }}
  </nav>
</header>
