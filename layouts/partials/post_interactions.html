{{- if .IsPage -}}
{{- $apiBase := site.Params.postInteractionsApi | default "" -}}
<section
  class="post-interactions"
  data-post-interactions
  data-post-path="{{ .RelPermalink }}"
  data-api-base="{{ $apiBase }}"
  data-post-title="{{ .Title | plainify | htmlEscape }}">
  <div class="post-interactions__panel" aria-live="polite">
    <span class="post-stat post-stat--views">
      <span class="post-stat__icon" aria-hidden="true">👀</span>
      <span class="post-stat__label">閱讀次數</span>
      <span class="post-stat__value" data-post-views>--</span>
    </span>
    <button type="button" class="post-like-button" data-post-like-button aria-label="喜歡這篇文章">
      <span class="post-like-button__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20.5s-6.7-4.3-9.2-8.1C.8 9.4 2 5.8 5.2 4.7c2-.7 4.1-.1 5.4 1.6 1.3-1.7 3.4-2.3 5.4-1.6 3.2 1.1 4.4 4.7 2.4 7.7-2.5 3.8-9.2 8.1-9.2 8.1Z"></path>
        </svg>
      </span>
      <span class="post-like-button__count" data-post-likes>--</span>
    </button>
  </div>
</section>
{{- end -}}
