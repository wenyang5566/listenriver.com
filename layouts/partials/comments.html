{{- $waline := site.Params.waline | default dict -}}
{{- $serverURL := index $waline "serverURL" | default "" -}}
{{- $lang := index $waline "lang" | default "zh-TW" -}}
{{- $locale := index $waline "locale" | default dict -}}
{{- if $serverURL -}}
<section
  class="post-comments"
  aria-label="留言"
  data-waline-root
  data-server-url="{{ $serverURL }}"
  data-path="{{ .RelPermalink }}"
  data-lang="{{ $lang }}"
  data-placeholder="{{ index $locale "placeholder" | default "寫點什麼吧..." }}"
  data-nick="{{ index $locale "nick" | default "如何稱呼" }}"
  data-mail="{{ index $locale "mail" | default "Email" }}"
  data-submit="{{ index $locale "submit" | default "送出" }}"
>
  <h2 class="post-comments-title">留言</h2>
  <div id="waline" class="post-comments-host"></div>
</section>
<script type="module">
  const root = document.querySelector('[data-waline-root]');

  if (root) {
    const mount = root.querySelector('#waline');
    const loadComments = async () => {
      if (!mount || mount.dataset.walineReady === '1') return;

      mount.dataset.walineReady = '1';

      try {
        const ensureStylesheet = () => {
          if (document.querySelector('link[data-waline-styles]')) return;

          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://cdn.jsdelivr.net/npm/@waline/client@v3/dist/waline.css';
          link.setAttribute('data-waline-styles', 'true');
          document.head.appendChild(link);
        };

        ensureStylesheet();
        const { init } = await import('https://cdn.jsdelivr.net/npm/@waline/client@v3/dist/waline.js');

        init({
          el: mount,
          serverURL: root.dataset.serverUrl,
          path: root.dataset.path.replace(/\/$/, ''),
          lang: root.dataset.lang || 'zh-TW',
          pageview: false,
          reaction: false,
          search: false,
          copyright: false,
          meta: ['nick', 'mail'],
          locale: {
            placeholder: root.dataset.placeholder || '寫點什麼吧...',
            nick: root.dataset.nick || '如何稱呼',
            mail: root.dataset.mail || 'Email',
            submit: root.dataset.submit || '送出'
          }
        });
      } catch (error) {
        mount.innerHTML = '<p class="post-comments-error">留言區載入失敗，請稍後再試。</p>';
      }
    };

    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        if (entries.some((entry) => entry.isIntersecting)) {
          observer.disconnect();
          loadComments();
        }
      }, { rootMargin: '320px 0px' });

      observer.observe(root);
    } else {
      loadComments();
    }
  }
</script>
{{- end -}}
