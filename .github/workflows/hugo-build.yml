name: Hugo Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.155.2"
          extended: true

      - name: Build site
        run: hugo --gc --minify

      - name: Validate sitemap URLs
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          sitemap_path = pathlib.Path("public/sitemap.xml")
          text = sitemap_path.read_text(encoding="utf-8")
          locs = re.findall(r"<loc>([^<]+)</loc>", text)

          if not locs:
              print(f"No <loc> entries found in {sitemap_path}")
              sys.exit(1)

          bad = [url for url in locs if not url.startswith("https://listenriver.com/")]
          if bad:
              print("Invalid sitemap URLs found:")
              for url in bad[:20]:
                  print(f" - {url}")
              if len(bad) > 20:
                  print(f" - ... and {len(bad) - 20} more")
              sys.exit(1)

          print(f"Validated {len(locs)} sitemap URLs in {sitemap_path}")
          PY

  worker-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: workers/post-interactions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: workers/post-interactions/package.json

      - name: Install worker dependencies
        run: npm install

      - name: Check worker
        run: npm run check
