name: Hugo Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.155.2"
          extended: true

      - name: Build site
        run: hugo --gc --minify

  worker-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: workers/post-interactions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: workers/post-interactions/package.json

      - name: Install worker dependencies
        run: npm install

      - name: Check worker
        run: npm run check
