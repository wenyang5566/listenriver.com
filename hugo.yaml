  env: production
  mainSections:
    - blog

  homeInfoParams:
    Title: "聆聽的河流"
    Content: "閱讀・書寫・心理・社會工作"
  homeFeaturedLimit: 4
  articleRelatedLimit: 4
  articleInternalLinksLimit: 3

  author: "文揚 Wen-Yang"
  description: "聆聽的河流｜閱讀・書寫・心理・社會工作"
  images:
    - "/images/og-default.png"
