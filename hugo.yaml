baseURL: "https://listenriver.com/"
languageCode: "zh-tw"
defaultContentLanguage: "zh-tw"
defaultContentLanguageInSubdir: false
title: "聆聽的河流｜閱讀・書寫・心理・社會工作"
theme: "PaperMod"
enableRobotsTXT: true
ignoreLogs:
  - warning-goldmark-raw-html

services:
  googleAnalytics:
    id: "G-P9L49HVNL4"

languages:
  zh-tw:
    baseURL: "https://listenriver.com/"
    languageCode: "zh-tw"
    languageName: "繁體中文"
    weight: 1

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

related:
  includeNewer: true
  indices:
    - name: tags
      weight: 90
    - name: categories
      weight: 60
    - name: date
      weight: 10
      pattern: "2006"

